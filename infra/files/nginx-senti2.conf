server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/senti2/frontend;
    index index.html;
    charset utf-8;

    client_max_body_size 20M;

    # SPA Angular
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API Laravel (mismo origen que el frontend)
    location ^~ /api {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/senti2/repo/senti2-backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/senti2/repo/senti2-backend/public;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
